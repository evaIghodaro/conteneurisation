version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tp2user
      POSTGRES_PASSWORD: tp2pass
      POSTGRES_DB: tp2
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tp2
      DB_USER: tp2user
      DB_PASSWORD: tp2pass
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db-data:
