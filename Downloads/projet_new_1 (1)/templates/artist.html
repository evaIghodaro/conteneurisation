<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des artistes</title>
    <link rel="stylesheet" href="/static/css/artist.css">
</head>
<body>
    <div class="nav-content">
        <h1 class="text-animate">
            <a href="" class="typewrite" data-period="2000" data-type='[ "La musique est la langue des émotions.", "La musique est le refuge des âmes ulcérées par le bonheur..", "La vie sans musique est tout simplement une erreur, une fatigue, un exil.", "Si on veut connaître un peuple, il faut écouter sa musique." ]'>
              <span class="wrap"></span>
            </a>
        </h1>

    </div>
    <div class="artist-container">
        <div class="title_artist">Artistes et Groupes Musicaux</div>
        <ul>
            {{range .}}
                <li>
                    <a href="/concerts?id={{.ID}}" class="remove_link">
                        <h2>{{.Name}}</h2>
                        <img src="{{.Image}}" alt="{{.Name}}" width="200">
                    </a>
                    <p>Année de début : {{.CreationDate}}</p>
                    <p>Premier album : {{.FirstAlbum}}</p>
                    <p style="color:blueviolet ; font-weight: bold">Membres : </p>
                    <p>{{range .Members}}{{.}}, {{end}}</p>
                </li>
            {{end}}
        </ul>
    </div>
</body>

<!-- optionnel -->
<script>
    var TxtType = function(el, toRotate, period) {
        this.toRotate = toRotate;
        this.el = el;
        this.loopNum = 0;
        this.period = parseInt(period, 10) || 2000;
        this.txt = '';
        this.tick();
        this.isDeleting = false;
    };

    TxtType.prototype.tick = function() {
        var i = this.loopNum % this.toRotate.length;
        var fullTxt = this.toRotate[i];

        if (this.isDeleting) {
        this.txt = fullTxt.substring(0, this.txt.length - 1);
        } else {
        this.txt = fullTxt.substring(0, this.txt.length + 1);
        }

        this.el.innerHTML = '<span class="wrap">'+this.txt+'</span>';

        var that = this;
        var delta = 200 - Math.random() * 100;

        if (this.isDeleting) { delta /= 2; }

        if (!this.isDeleting && this.txt === fullTxt) {
        delta = this.period;
        this.isDeleting = true;
        } else if (this.isDeleting && this.txt === '') {
        this.isDeleting = false;
        this.loopNum++;
        delta = 500;
        }

        setTimeout(function() {
        that.tick();
        }, delta);
    };

    window.onload = function() {
        var elements = document.getElementsByClassName('typewrite');
        for (var i=0; i<elements.length; i++) {
            var toRotate = elements[i].getAttribute('data-type');
            var period = elements[i].getAttribute('data-period');
            if (toRotate) {
              new TxtType(elements[i], JSON.parse(toRotate), period);
            }
        }
        // INJECT CSS
        var css = document.createElement("style");
        css.type = "text/css";
        css.innerHTML = ".typewrite > .wrap { border-right: 0.08em solid #fff}";
        document.body.appendChild(css);
    };
</script>
</html>
